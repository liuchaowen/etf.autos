name: ETF Signal Notification

on:
  # 每个工作日（周一到周五）北京时间 15:30 执行
  # UTC 时间 07:30 (北京时间 = UTC + 8)
  schedule:
    - cron: '30 7 * * 1-5'
  # 支持手动触发
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ETF signal detection and send emails
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: npx ts-node scripts/send-etf-signals.ts
      
      - name: Upload subscribers data (for backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subscribers-data
          path: data/subscribers.json
          retention-days: 7